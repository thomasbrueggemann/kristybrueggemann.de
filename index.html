<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Bundled Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #8C5B3F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #__bundler_loading {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      color: #666;
      background: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      z-index: 10000;
    }

    #__bundler_thumbnail {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #8C5B3F;
      z-index: 9999;
    }

    #__bundler_thumbnail svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #__bundler_placeholder {
      color: #999;
      font-size: 14px;
    }
  </style>
  <noscript>
    <style>
      #__bundler_loading {
        display: none;
      }
    </style>
    <div
      style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
</head>

  </div>

  <script>

    document.addEventListener('DOMContentLoaded', async function () {
      const loading = document.getElementById('__bundler_loading');
      function setStatus(msg) { if (loading) loading.textContent = msg; }

      const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
      const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
      function toBase64(bytes) {
        let bin = '';
        for (let i = 0; i < bytes.length; i += 0x8000) {
          bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
        }
        return btoa(bin);
      }

      // Error sink persists across replaceWith since it's on window, not the DOM.
      window.addEventListener('error', function (e) {
        var p = document.body || document.documentElement;
        var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
        d.id = '__bundler_err';
        d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
        d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
          '[bundle] ' + (e.message || e.type) +
          (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
      }, true);

      try {
        const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
        const templateEl = document.querySelector('script[type="__bundler/template"]');
        if (!manifestEl || !templateEl) {
          setStatus('Error: missing bundle data');
          console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
          return;
        }

        const manifest = JSON.parse(manifestEl.textContent);
        let template = JSON.parse(templateEl.textContent);

        const uuids = Object.keys(manifest);
        setStatus('Unpacking ' + uuids.length + ' assets...');

        const blobUrls = {};
        const resourceBlobs = {};
        await Promise.all(uuids.map(async (uuid) => {
          const entry = manifest[uuid];
          try {
            const binaryStr = atob(entry.data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            let finalBytes = bytes;
            if (entry.compressed) {
              if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                const reader = ds.readable.getReader();
                writer.write(bytes);
                writer.close();
                const chunks = [];
                let totalLen = 0;
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  chunks.push(value);
                  totalLen += value.length;
                }
                finalBytes = new Uint8Array(totalLen);
                let offset = 0;
                for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
              } else {
                console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
              }
            }

            if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
              // Strict artifact hosts allow font-src data: but not blob:.
              blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
                (entry.compressed ? toBase64(finalBytes) : entry.data);
            } else {
              const blob = new Blob([finalBytes], { type: entry.mime });
              blobUrls[uuid] = URL.createObjectURL(blob);
              resourceBlobs[blobUrls[uuid]] = blob;
            }
          } catch (err) {
            console.error('Failed to decode asset ' + uuid + ':', err);
            const blob = new Blob([], { type: entry.mime });
            blobUrls[uuid] = URL.createObjectURL(blob);
            resourceBlobs[blobUrls[uuid]] = blob;
          }
        }));

        const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
        const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
        const resourceMap = {};
        for (const entry of extResources) {
          if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
        }

        // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
        // consumers read these Blobs directly. Survives the swap like the error sink.
        window.__resourceBlobs = resourceBlobs;

        setStatus('Rendering...');
        for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

        // Strip integrity + crossorigin — blob URLs from a file:// document inherit
        // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
        // The manifest bytes are ours; SRI protects against CDN compromise, not this.
        template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

        const resourceScript = '<script>window.__resources = ' +
          JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
          ';</' + 'script>';
        // Inject after <head> so the DOCTYPE stays first; prepending the script
        // would push the parser into quirks mode. DOMParser always emits a <head>
        // (synthesizing one if the source HTML omitted it) but may carry
        // attributes through, so match the full opening tag. slice() rather than
        // replace() keeps us clear of $-pattern substitution in resourceScript.
        const headOpen = template.match(/<head[^>]*>/i);
        if (headOpen) {
          const i = headOpen.index + headOpen[0].length;
          template = template.slice(0, i) + resourceScript + template.slice(i);
        }

        // Parse the template and swap the root element. Scripts inserted via
        // DOMParser/replaceWith are inert per spec — re-create each with
        // createElement so they execute, awaiting onload for src scripts to
        // preserve ordering (React before ReactDOM before Babel before text/babel).
        const doc = new DOMParser().parseFromString(template, 'text/html');
        document.documentElement.replaceWith(doc.documentElement);
        const dead = Array.from(document.scripts);
        for (const old of dead) {
          const s = document.createElement('script');
          for (const a of old.attributes) s.setAttribute(a.name, a.value);
          s.textContent = old.textContent;
          // text/babel scripts with a src: read and inline. transformScriptTags
          // does XHR against the src, but blob:null/ from a file:// origin is
          // silently dropped. Inlining makes it a plain inline babel script,
          // which transformScriptTags handles unconditionally.
          if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
            const pre = resourceBlobs[s.src.split('#')[0]];
            s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
            s.removeAttribute('src');
          }
          const p = s.src ? new Promise(function (r) { s.onload = s.onerror = r; }) : null;
          old.replaceWith(s);
          if (p) await p;
        }
        // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
        // which fired before we swapped the document. Trigger manually if present.
        if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
          window.Babel.transformScriptTags();
        }
      } catch (err) {
        setStatus('Error unpacking: ' + err.message);
        console.error('Bundle unpack error:', err);
      }
    });

  </script>

"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#BC8B70; margin:0 0 34px;\">Textos breves &amp; poesía<\u002Fp>\n      <h1 style=\"font-weight:200; font-size:62px; line-height:1.2; letter-spacing:-.01em; margin:0; max-width:660px; color:#FBF5EC; text-wrap:balance;\">De todas las cosas que recuerdo, <span style=\"font-style:italic; font-weight:300; color:#6A94F0;\">recuerdo estas cosas más.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:20px; line-height:1.8; font-weight:300; color:#E4D8C8; max-width:500px; margin:40px 0 0;\">Tiempos y lugares que no serán olvidados.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== OBRA ===== -->\n  <section id=\"obra\" style=\"max-width:1120px; margin:0 auto; padding:20px 40px 60px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; padding:0 0 40px;\">\n      <h2 style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.24em; text-transform:uppercase; color:#E19854; font-weight:400; margin:0;\">La obra<\u002Fh2>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#E4D8C8;\">{{ count }} piezas<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:20px;\">\n      <sc-for list=\"{{ pieces }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <article id=\"piece-{{ item.id }}\" style=\"width:min(832px, 100%); margin-left:{{ item.offset }};\">\n          <button onclick=\"{{ item.onToggle }}\" style=\"all:unset; cursor:pointer; display:flex; width:100%; align-items:center; gap:26px;\">\n            <span style=\"font-family:'Newsreader',serif; font-weight:200; font-size:72px; line-height:.8; color:#A37053; transform:rotate({{ item.rotate }}); flex:none;\">{{ item.num }}<\u002Fspan>\n            <span style=\"display:flex; flex-direction:column; gap:12px; align-items:flex-start;\">\n              <span style=\"display:inline-flex; align-items:center; padding:4px 12px; border-radius:20px; background:{{ item.tint }}; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:{{ item.accent }};\">{{ item.kind }} · {{ item.year }}<\u002Fspan>\n              <span style=\"font-size:30px; font-weight:400; line-height:1.15; color:{{ item.titleColor }};\">{{ item.title }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin:24px 0 8px; padding:32px 38px; border-radius:16px; background:#6B4A2C; border-left:4px solid {{ item.accent }}; width:fit-content; max-width:min(780px, 100%);\">\n              <p style=\"white-space:pre-line; font-size:21px; line-height:1.9; margin:0; color:#ECE0D0; font-weight:300;\">{{ item.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SOBRE ===== -->\n  <section id=\"sobre\" style=\"position:relative; background:#75482F; margin-top:80px; border-top:1px solid rgba(255,255,255,.1); overflow:hidden;\">\n    <span style=\"position:absolute; top:-80px; left:-80px; width:300px; height:260px; background:#A37053; opacity:.42; mix-blend-mode:screen; border-radius:58% 42% 40% 60% / 55% 58% 42% 45%; animation:mvmorph1 26s ease-in-out infinite; pointer-events:none;\"><\u002Fspan>\n    <span style=\"position:absolute; bottom:-100px; right:110px; width:230px; height:210px; background:#E19854; opacity:.42; mix-blend-mode:screen; border-radius:63% 37% 45% 55% / 40% 55% 45% 60%; animation:mvmorph2 22s ease-in-out infinite; pointer-events:none;\"><\u002Fspan>\n    <span style=\"position:absolute; top:60px; right:60px; width:90px; height:90px; border-radius:50%; background:#6D8E6F; opacity:.4; mix-blend-mode:screen; animation:mvfloat 14s ease-in-out infinite; pointer-events:none;\"><\u002Fspan>\n    <div style=\"position:relative; max-width:1120px; margin:0 auto; padding:110px 40px; display:flex; gap:72px; align-items:flex-start; flex-wrap:wrap;\">\n      <div style=\"width:280px; flex:none;\">\n        <div style=\"width:280px; height:352px; border-radius:8px; overflow:hidden; box-shadow:0 18px 44px -18px rgba(60,40,25,.5); rotate:-2deg;\">\n          <img src=\"profile.jpg\" alt=\"Retrato de la artista\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; min-width:320px; max-width:520px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#E19854; margin:0 0 26px;\">Sobre la artista<\u002Fp>\n        \n        <p style=\"font-size:26px; line-height:1.55; font-weight:300; margin:0 0 28px; color:#FBF5EC;\">Kristy Brüggemann - Un diario de una hermosa infancia: el abuso, el abandono y la vida en las calles reimaginada como prosa y poesía nueva.<\u002Fp><p style=\"font-size:18px; line-height:1.85; font-weight:300; margin:0; color:#E4D8C8;\">Recientemente empecé a escribir en español como una forma de terapia, a llamar a los lugares y cosas que recuerdo, a sentirme conectado con mi entorno, a sentir familiaridad en un lugar tan ajeno y desconectado de las cosas que conozco por nombre.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONTACTO / FOOTER ===== -->\n  <footer id=\"contacto\" style=\"max-width:1120px; margin:0 auto; padding:90px 40px 100px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:32px;\">\n    <div>\n      <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:#6A94F0; margin:0 0 16px;\">Contacto<\u002Fp>\n      <a href=\"mailto:kristy@kristybrueggemann.de\" style=\"font-size:32px; font-weight:300; color:#FBF5EC;\">kristy@kristybrueggemann.de<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:24px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">\n      <a href=\"https://instagram.com/opal.ok.wells\" target=\"_blank\" rel=\"noopener\" style=\"color:#E19854;\">Instagram<\u002Fa>\n      <a href=\"#top\" style=\"color:#6D8E6F;\">Boletín<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#b09a86; width:100%; margin:24px 0 0; padding-top:24px; border-top:1px solid rgba(255,255,255,.1);\">© 2026 Kristy Brüggemann — Todos los textos son de la autora.<\u002Fp>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: 'p1' };\n\n  pieces = [\n    { id: 'p1', title: 'El camino de grava', kind: 'Prosa', year: '2026',\n      body: 'El camino de grava de piedra caliza dividió la estepa en dos, separaba el desierto de la sabana. Nuestra casa se alzaba de la hierba sobre bloques de cemento y zancos cortos que daban sombra a las serpientes y lagartos que dormían bajo nosotros, pero yo apenas dormía. Me mantuvieron despierta los chapulines, las cigarras y los gecos que ladraban más fuerte que los perros de los vecinos, cuyo único refugio también estaba en el polvo rosado bajo su propio porche elevado. Eran nuestros únicos vecinos con quienes compartimos el camino de piedra caliza que dividía la estepa en desierto y sabana, y la mezquita retorcida y los robles atrofiados, y los toritos amarillos secos y el matorral de espinas que componían nuestra patria.\\n\\nLas estaciones se arrastraron, calientes, como el fuego. A veces controladas e intencionadas, quemando barriles y montones de matorrales para controlar las serpientes de cascabel y la vid, pero otras veces los incendios se encendían solos, empujando a los jabalíes y ciervos más adentro de la estepa. Las estaciones no se caracterizaban por la temperatura, sino por tornados, incendios, inundaciones y plagas de escarabajos torpes que llamaban a los murciélagos que los devoraban. Siempre hacía calor.\\n\\nSolíamos celebrar la Navidad asando fajitas cerca del huerto donde cultivaba la okra, el calabacín y los chiles. Una vez planté descuidadamente granos de maíz y frijoles negros de un proyecto escolar descuidado en la sombra parcial de la casa, que se apoderó de la pared orientada al norte y se elevó por encima de los arbustos más altos a lo largo del camino de piedra caliza, al nivel del techo de la casa, como testimonio del poder del sol. Como yo, la vida creció en el suelo arcilloso agrietado, a pesar de todo.\\n\\nTodos teníamos nuestra forma de sobrellevarlo. Las hormigas bala tenían su mordida, como los escorpiones tenían su picadura, como las serpientes tenían su veneno y las plantas sus espinas. Tenía mi imaginación, y mi lugar en el árbol de mezquite, las vides que solía columpiar de fingir que era Tarzán, desconocido, más animal que humano. Aprendí a esconderme, a crear refugio y a refugiarme, dejar que el sonido de los grillos ocultara el crujido de las ramitas bajo mis pies descalzos, y no temer a los jabalíes sino ser Tarzán entre la familia, nadar con las serpientes y las tortugas mordedoras, ser consciente del peligro de jugar con el fuego pero hacerlo de todos modos. Escapar con mi mente cuando el polvo de piedra caliza se aferraba a las ampollas abiertas quemadas en mis pies por el sol abrasador, para reconocer las formaciones de nubes antes de que el tornado tocara tierra.\\n\\nEn aquel entonces, no conocía otra alternativa, nada diferente a la vida en el camino de piedra caliza que dividía la estepa en desierto y sabana, los dolores de crecimiento y las lecciones aprendidas de la manera dura, de pies ligeros como un frijol saltarín, saltando entre inundaciones y tornados, cactus y toritos desiertos, pero el mundo salvaje debería temblar de miedo de mí.\\n\\nSi volviera a la estepa, volvería como un escorpión emergiendo de debajo de una roca por primera vez, nunca habría vuelto un aguijón, despreocupado sabiendo que el mundo existe fuera de los áridos desiertos y sabanas que me acogieron, y que no necesito guardar mi fuerza.' },\n    { id: 'p2', title: 'Los aguaceros', kind: 'Poesía', year: '2026',\n      body: 'Me encanta la lluvia, especialmente las lluvias cálidas que caen como cascadas.\\nLa calma, las quemaduras en las plantas de mis pies.\\nLa lluvia y el sol, juntos, inundan las grietas de la arcilla.\\nCañones a las hormigas y zopilotes por igual que se dispersan a sus cuevas.\\nLas hormigas pueden devorarme vivo, pero los zopilotes prefieren a los muertos---\\n\\nY la huelo.\\n\\nLa tolvanera se pone a descansar.\\nEl perfume del polvo de la tolvanera permanece y se mezcla\\ncon la corteza de la vid que estrangula el mezquite,\\npero por un breve momento, respiro.\\nComo el huico, con la lengua extendida, saboreo el aire,\\n¡Renovada!\\n\\nNada ni nadie que me lleve lejos sino esta inundación.\\nLiberada.\\n\\nRespiro un suspiro de alivio.\\nNaranja como el monstruo de gila revelada bajo la lluvia,\\nla terracota que me cubre, que como yo fue una vez piedra,\\nExpuesta.\\n\\nMi cuerpo se calla, no queda lucha para luchar.\\nComo la piel ampollada se suaviza, yo también me rindo.\\nEl tambor de las lluvias refleja el tambor en mi corazón,\\nPero mis pies no tamborilean la tierra;\\npuedo dejar de correr ahora.\\n\\nComo el pecarí que juega, yo juego también\\ny bailo a través de la tormenta.\\nHay refugio en el desastre cuando distrae a los depredadores de sus presas.\\nMe hundiré en el cieno y ahogaré mi sed hasta que el sol me reduzca a una estatua otra vez.\\nSiempre cesa como empieza, pero a fin de cuentas:\\nMe encanta la lluvia, hay quietud en el diluvio.' },\n    { id: 'p3', title: 'Antes era salvaje', kind: 'Poesía', year: '2026',\n      body: 'Antes era salvaje.\\nLechos de ríos secos bajo pies quemados desnudos,\\npasé de puntillas alrededor de rebabas del abrojo de flor amarilla.\\n\\nDe niños éramos como linces, ágiles y rápidos,\\nentre las hormigas pantera a la caza de piedras de ojo de gato,\\nÉramos tontos por el cuarzo y el oro de los tontos por igual.\\nAtamos nuestras camisetas como cofres del tesoro, y nunca nos pesaba.\\nTratamos el hambre y la sed de la misma manera, nunca nos pesaba.\\n\\nNopales crecían como un espejismo en la maleza, cuando éramos linces,\\ngolpeábamos la maleza con palos antes de dirigirnos hacia la ciudad de cactus,\\ny escuchábamos el susurro de las serpientes que se refugiaban en la sombra.\\nNuestros dedos siempre estaban manchados de rojo con la sangre de la fruta que llevaba una corona de espinas y nos dio vida.\\nRetorcimos las cabezas de la planta con instinto más que conocimiento.\\n\\nCuando éramos indómitos, capturábamos escíncidos y descuartizábamos serpientes de cascabel.\\nY cuando el río resucitó crecimos aletas.\\n\\nNadamos.\\n\\nNadamos, y flotamos, cuando no estábamos tratando de ahogarnos unos a otros por deporte.\\n\\nCuando era salvaje, éramos tiburones y pececillos, pero siempre fui un pececillo.\\nTendríamos cuidado con las serpientes de boca de algodón,\\npero no son rival para los feroces tiburones del río.\\n\\nA medida que el río se elevaba, ocultaba las plantas puntiagudas sumergidas debajo,\\ny así nos vimos obligados a crecer.\\nDesarrollamos piernas y patas correosas y subíamos a las ramas retorcidas del árbol de palo santo, o mezquite con espinas igual.\\n\\nCuando éramos linces,\\nlos enjambres de escarabajos eran nuestros amigos.\\n\\nZumbaban.\\n\\nNos cosquilleaban los pelos de los brazos mientras admirábamos sus escudos.\\nEran torpes, a diferencia de nosotros, y les ayudamos, frecuentemente, a ponerse de pie.\\nFuimos tan misericordiosos como crueles cuando éramos linces,\\npero también lo era el mundo.\\n\\nCaminamos, nadamos y escalamos, pero soy la única que voló y sobrevivió,\\nSólo éramos cachorros cuando estábamos en los matorrales\\npero al crecer me convertí en zopilote, y comí cuando murieron.\\nAhora somos dóciles.' },\n    { id: 'p4', title: 'El flashback', kind: 'Poesía', year: '2026',\n      body: 'Entonces era diferente.\\nEl aire nocturno era pegajoso, y como un perfume,\\nla citronela y las colillas de cigarrillos se aferraban a nuestra ropa.\\n\\nLa noche estaba roja con el resplandor del farol que incineraba a los insectos.\\nAtraíamos a los mosquitos, que atraían a los murciélagos, y los murciélagos bailaban para nosotros.\\nNunca hubo un círculo de vida.\\nAl menos, no entonces.\\n\\nEn aquel entonces, las noches eran insufriblemente ruidosas.\\nLos gecos y las cigarras cantaban igualmente, pero los grillos me mantuvieron despierta.\\nY nos tenían rodeados.\\nEl aire era espeso y pesado, y lleno de los sonidos del canto y pelea.\\nCada sombra era una amenaza, pero apagar la luz era más sombrío que la negrura.\\n\\nRecientemente compré aceite de citronela, e inmediatamente me trajo atrás en el tiempo.\\nEl terror me agarró por la nariz, y me arrojó con las culebrillas ciegas.\\nRecuerdo cada detalle de esas noches, como las chispas que volaban de la farol roja,\\ny nuestras huellas consagradas en la piedra que rodeaba la casa, que estaba llena de ruido.\\nPero siempre estábamos fuera con los perros, con los mosquitos,\\ny las sombras en las paredes que no nos protegieron.\\nEl aire se sentía diferente en aquel entonces.\\n\\nAhora, es seco, tranquilo y seguro,\\npero elegí comprar citronela y rodearme de plantas como si todavía estuviera allí.\\nSé que sería normal para cualquier otra persona se sintiera sentimental.\\nPero para mí la citronela huele a colillas de cigarrillo y suena a huesos agrietados,\\ny tiene el sabor a barro y parece ceguera en la oscuridad.\\nY lo elegí.\\n\\nAhora la botellita está en el mueble de baño\\ncomo un portal a un universo que debe permanecer cerrado.\\nestá contenido, evitado, pero en el fondo de mi mente.\\nObviamente.' },\n    { id: 'p5', title: 'En la zanja', kind: 'Poesía', year: '2026',\n      body: 'No fue tan malo.\\nViví con los pecaríes\\nescondido en el pasto alto, en la zanja,\\nfuera de la vista de los coches que pasan por la carretera,\\nfrente al centro comercial donde la gente gastaba su dinero--\\n\\nDuramente ganado!\\n\\nPero yo estaba del otro lado–\\n\\nLo gané!\\n\\nVi el mundo con los ojos enfocados solo en mi camino,\\nSabía mejor que mirar a los ojos con mis ojos.\\nun panorama de cuerpos en el suelo a mi alrededor, y nada más.\\nCabeza baja, me quedé en silencio.\\n\\nLas javelinas y yo estábamos como familia, juntos con las hormigas,\\npalpando las vibraciones de los pasos en la oscuridad,\\npero rara vez vinieron.\\n\\nSiempre he sido bueno ocultando,\\ny tuve a mi familia allí conmigo,\\nlas javelinas,\\nen la zanja, al otro lado, del centro comercial\\ncon la basura arrojada desde las ventanas de los coches en movimiento.\\nOculto,\\npero no fue tan malo.' },\n    { id: 'p6', title: 'La playa del mismo nombre', kind: 'Poesía', year: '2026',\n      body: 'Hipnotizado por las luces danzantes en el techo de arriba,\\nlas olas del agua brillante ondeaban por encima.\\nComo las nubes se convierten en sueños,\\nvimos serpientes marinas y tormentas de truenos.\\n\\nObservamos maravillados hasta que nos atrapó.\\nPiel de escamas rojas como si fuéramos pargos,\\nSumergidos éramos tiburones y pececillos,\\nPero en el fondo de la Atlántida vivimos como hijos de dios.\\n\\nYo era una diplomática que bebía té con nobleza.\\nSe librarían guerras mientras yo esquivaba torpedos.\\n\\nY vivimos allí durante años, en cuevas como castillos\\nacompañados de caballitos de mar\\npero eventualmente los rayos de luz dejaron de alcanzar,\\nlas profundidades del mar\\ny emergimos del agua como tritones\\nnecesitábamos descansar,\\nde las profundidades del mar.\\n\\nMientras me acostaba en la cama por la noche\\npodía escuchar el mar hinchándose en mi mente.\\nComo una concha presionada a encima de mi oreja,\\ny mi almohada como la arena sobre la que duerme una sirena cansada--\\n\\nY si no regresara al mar con frecuencia\\nlas escamas desaparecerían y volvería a ser humana.\\n\\nSé esto por un hecho porque me pasó a mí,\\nahora miro hacia el agua que está bailando en el techo aquí,\\npero no tengo aletas, ni branquias, ni escalas.\\n\\nMi piel es como el papel y mis ojos como la tierra\\ny las olas que me atraparon, ahora me echan afuera.\\n\\nQuiero vivir en la ciudad de la que solía ser,\\nsolo ser rico en dólares de arena,\\nver los caballitos de mar pastar,\\ndesde la vista en mi castillo,\\nmi cueva submarina.\\n\\nQuiero vivir la vida como una sirena.' },\n    { id: 'p7', title: 'Bailaba', kind: 'Poesía', year: '2026',\n      body: 'Recuerdo que bailaba detrás de la pulpería,\\ndebajo del toldo de aluminio corregido.\\nSiempre llevaba el mismo vestido\\nbordado con tenangos, que giraba conmigo.\\n\\nGiraría, giramos juntos.\\n\\nLlevaba un chaleco vaquero y botas vaqueras a juego,\\nen juego como una pelota que se pasa,\\npasos adelante y atrás.\\n\\nAdelante y atrás.\\n\\nDe niña bailaba con cualquiera.\\nen la acera frente a la pulpería\\nuna trenza fuertemente trenzada\\nmi vestido de colores,\\nhombres en camisas florales,\\ncon todos los demás del pueblo,\\nbotas de tacón en el suelo.\\n\\nel patio de la pulpería,\\nsin cuidado había alegría\\nun jueves por la noche,\\npero cada jueves,\\naluminio corrigido y lucecitas,\\nsillas plegables, mujeres y chiquitas\\n\\nBailaba sobre el agua\\ny aprendí que nunca aprendí a bailar.\\nAllí me enseñaron a contar\\ny que nunca supe bailar\\nUno, dos, tres,\\ncinco, seis, siete.\\nsolía amar bailar\\npero me robaron el baile.\\n\\nAnhelo bailar, donde nadie conoce los pasos.\\nEn los patios, las tiendas de barrios,\\nLucecitas, sillas plegables,\\npersonas amables\\nignorancia e intuición\\nel movimiento como comunicación\\n\\nQuiero bailar de nuevo,\\ndebajo del toldo de aluminio corregido,\\ncomo lo hice cuando era pequeña.' },\n  ];\n\n  renderVals() {\n    const palette = ['#A37053', '#6A94F0', '#E19854', '#6D8E6F', '#8C5B3F'];\n    const offsets = ['0px', '0px', '0px', '0px', '0px', '0px', '0px', '0px'];\n    const rotates = ['0deg', '0deg', '0deg', '0deg', '0deg', '0deg', '0deg', '0deg'];\n    const pieces = this.pieces.map((p, i) => {\n      const open = this.state.open === p.id;\n      const accent = '#E19854';\n      return {\n        ...p,\n        num: String(i + 1).padStart(2, '0'),\n        open,\n        accent,\n        tint: accent + '2E',\n        offset: offsets[i % offsets.length],\n        rotate: rotates[i % rotates.length],\n        titleColor: '#FBF5EC',\n        onToggle: () => this.setState(\n          (s) => ({ open: s.open === p.id ? null : p.id }),\n          () => {\n            if (this.state.open === p.id) {\n              requestAnimationFrame(() => {\n                const el = document.getElementById('piece-' + p.id);\n                if (el) {\n                  const top = el.getBoundingClientRect().top + window.scrollY - 90;\n                  window.scrollTo({ top, behavior: 'smooth' });\n                }\n              });\n            }\n          }\n        ),\n      };\n    });\n    return { pieces, count: String(this.pieces.length).padStart(2, '0') };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
